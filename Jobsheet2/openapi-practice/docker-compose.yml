services:
  api:
    build: .
    container_name: node_api_service
    ports:
      - "3000:3000"   # HTTP/General
      - "50051:50051" # gRPC
      - "8000:8000"
      # - "8084:8080"   # WebSocket
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules # Anonymous volume to protect container's node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    restart: always
  
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /api/openapi.yaml
    volumes:
      - ./openapi.yaml:/api/openapi.yaml
